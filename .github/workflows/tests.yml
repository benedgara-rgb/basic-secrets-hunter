# Simple CI: run the test suite on every push and PR.
# Produces a green checkmark on the repo when tests pass.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        # GITHUB_TOKEN is a dummy value — tests are fully mocked and don't
        # actually call the GitHub API.  This just satisfies the env check
        # that GitHubClient runs during initialization in the test fixtures.
        env:
          GITHUB_TOKEN: ghp_dummy_token_for_tests_not_a_real_credential
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
