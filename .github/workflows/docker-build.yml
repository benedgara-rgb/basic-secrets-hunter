# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/docker-build.yml
#
# CI/CD pipeline for CTI SSH Key Hunter.
# Triggers on every push to main and on version tags (v*.*.*).
#
# Pipeline stages:
#   1. test    — Run pytest suite inside the container (no live network calls)
#   2. build   — Build and tag the Docker image
#   3. scan    — Run Trivy vulnerability scan on the image
#   4. push    — Push to GitHub Container Registry (ghcr.io) on main/tags
#
# Required repository secrets:
#   GITHUB_TOKEN  — automatically provided by GitHub Actions (for GHCR push)
#
# Optional secrets (for Docker Hub push):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
# ─────────────────────────────────────────────────────────────────────────────

name: Build · Test · Scan · Push

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  # GitHub Container Registry image name
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/cti-ssh-hunter
  # Docker Hub image name (set to your org/repo if using Docker Hub)
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cti-ssh-hunter

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Run pytest suite inside the container
  # No live GitHub API calls — all tests use unittest.mock
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: pytest (inside container)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for testing
        run: |
          docker build \
            --target runtime \
            --tag cti-ssh-hunter:test \
            .

      - name: Run pytest suite
        run: |
          docker run --rm \
            --read-only \
            --tmpfs /tmp:size=128m \
            --env GITHUB_TOKEN=ghp_dummy_test_token \
            --env LOG_LEVEL=WARNING \
            --env OUTPUT_DIR=/tmp/test-output \
            --entrypoint python \
            cti-ssh-hunter:test \
            -m pytest tests/ \
              --verbose \
              --tb=short \
              --cov=src \
              --cov-report=xml:/tmp/coverage.xml \
              --cov-fail-under=80

      - name: Extract coverage report from container
        if: always()
        run: |
          # Run again just to copy coverage.xml out for Codecov upload
          docker run --rm \
            --tmpfs /tmp:size=128m \
            --env GITHUB_TOKEN=ghp_dummy_test_token \
            --env OUTPUT_DIR=/tmp/test-output \
            --entrypoint python \
            cti-ssh-hunter:test \
            -m pytest tests/ \
              --cov=src \
              --cov-report=xml:coverage.xml \
              -q 2>/dev/null || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Build and tag the production Docker image
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write    # Required for pushing to GHCR

    outputs:
      # Pass the image digest to the scan job for immutable reference
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag:    ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for image tagging
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          tags: |
            # Tag with git SHA for every commit (immutable, traceable)
            type=sha,prefix=sha-,format=short
            # Tag with semver when a v*.*.* tag is pushed
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Tag as 'latest' only on pushes to main
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=CTI SSH Key Hunter
            org.opencontainers.image.description=Ethical GitHub SSH key exposure scanner

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is auto-provided; no additional secret needed for GHCR
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # Only push on main branch and version tags, not on PRs
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up repeated builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Multi-platform build (add linux/arm64 for M-series Mac / Graviton)
          platforms: linux/amd64

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Trivy vulnerability scan
  # Scans the built image for OS and library CVEs.
  # Fails the pipeline on CRITICAL severity CVEs.
  # ──────────────────────────────────────────────────────────────────────────
  scan:
    name: Trivy CVE scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write    # Required to upload SARIF to GitHub Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          # Scan the image built in the previous job
          image-ref: ${{ env.GHCR_IMAGE }}:latest
          format: sarif
          output: trivy-results.sarif
          # Fail on CRITICAL CVEs; warn on HIGH
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: Optional Docker Hub push (only runs if secret is set)
  # ──────────────────────────────────────────────────────────────────────────
  push-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [ build, scan ]
    if: |
      github.event_name != 'pull_request' &&
      secrets.DOCKERHUB_USERNAME != ''
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker Hub tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64
